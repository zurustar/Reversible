name: Release build

# Runs when a GitHub Release is published: test, build the single-file app,
# and attach it to the release as a downloadable asset.
# Also runnable manually (workflow_dispatch) as a build check.
on:
  release:
    types: [published]
  workflow_dispatch:

# Least privilege: only what's needed to upload a release asset (SEC-06).
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned by major version. For stricter supply-chain integrity
      # (SEC-10/13) you may pin these to full commit SHAs.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (locked)
        run: npm ci

      - name: Test
        run: npm test

      - name: Build single-file app
        run: npm run build

      - name: Attach build to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          cp dist/index.html "reversible-${TAG}.html"
          gh release upload "${TAG}" "reversible-${TAG}.html" --clobber

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: reversible-dist
          path: dist/index.html
